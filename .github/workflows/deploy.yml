# Verifies every change (lint + typecheck + tests) and deploys main to GitHub Pages.
name: CI & Deploy

on:
  # Verify + deploy on pushes to the default branch
  push:
    branches: ["main", "master"]

  # Verify pull requests (no deploy)
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Quality gate: must pass before anything is deployed. Also runs on PRs.
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  deploy:
    # Only deploy after the gate passes, and never for pull requests.
    needs: verify
    if: github.event_name != 'pull_request'

    # Allow only one concurrent deployment, skipping runs queued between the
    # run in-progress and latest queued. Do NOT cancel in-progress production
    # deployments.
    concurrency:
      group: "pages"
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Автоматически подставляет имя репозитория как базовый путь (например, /AdvancedGUI-CE/)
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
